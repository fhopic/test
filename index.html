<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raj Edits | Studio</title>

<link rel="stylesheet" href="style.css">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

</head>

<body>

<div class="cursor"></div>

<header class="navbar">
  <h1>RAJ EDITS</h1>
  <nav>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <video autoplay muted loop>
    <source src="https://www.w3schools.com/howto/rain.mp4">
  </video>
  <div class="hero-text">
    <h2 class="animate">Cinematic Video Editor</h2>
  </div>
</section>

<section id="work" class="work">

  <h2 class="animate">Featured Work</h2>

  <div class="grid">

    <div class="card">
      <video muted loop>
        <source src="your-video1.mp4">
      </video>
    </div>

    <div class="card">
      <video muted loop>
        <source src="your-video2.mp4">
      </video>
    </div>

    <div class="card">
      <video muted loop>
        <source src="your-video3.mp4">
      </video>
    </div>

  </div>

</section>

<section id="about" class="about animate">
  <h2>About Me</h2>
  <p>High-end cinematic edits, reels, ads & storytelling visuals.</p>
</section>

<section id="contact" class="contact animate">
  <h2>Contact</h2>
  <a href="#">WhatsApp</a>
  <a href="#">Email</a>
</section>

<script src="script.js"></script>

</body>
</html>
